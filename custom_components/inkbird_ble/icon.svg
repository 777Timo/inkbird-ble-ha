<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Hintergrund: abgerundetes Quadrat, dunkel -->
  <rect width="256" height="256" rx="52" fill="#1C1C1E"/>

  <!-- Glüh-Halo hinter dem Grill -->
  <radialGradient id="glow" cx="50%" cy="52%" r="45%">
    <stop offset="0%" stop-color="#FF6935" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#FF6935" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="128" cy="130" rx="90" ry="80" fill="url(#glow)"/>

  <!-- Beine (vor Körper damit Körper überlappt) -->
  <line x1="93"  y1="166" x2="68"  y2="224" stroke="#888" stroke-width="11" stroke-linecap="round"/>
  <line x1="163" y1="166" x2="188" y2="224" stroke="#888" stroke-width="11" stroke-linecap="round"/>
  <!-- Querstrebe -->
  <line x1="78"  y1="200" x2="178" y2="200" stroke="#888" stroke-width="9"  stroke-linecap="round"/>

  <!-- Grill-Körper Unterhälfte (Schale) -->
  <path d="M66 124 Q66 172 128 172 Q190 172 190 124 Z" fill="#3A3A3C"/>

  <!-- Grillrost-Linien -->
  <clipPath id="bowl">
    <path d="M66 124 Q66 172 128 172 Q190 172 190 124 Z"/>
  </clipPath>
  <g clip-path="url(#bowl)" stroke="#FF6935" stroke-width="2.5" opacity="0.4">
    <line x1="66" y1="138" x2="190" y2="138"/>
    <line x1="66" y1="152" x2="190" y2="152"/>
    <line x1="96"  y1="124" x2="88"  y2="172"/>
    <line x1="128" y1="124" x2="128" y2="172"/>
    <line x1="160" y1="124" x2="168" y2="172"/>
  </g>

  <!-- Flamme (innerhalb der Schale) -->
  <g opacity="0.85">
    <!-- linke Flamme -->
    <path d="M110 165 Q102 148 112 138 Q107 148 118 152 Q114 140 122 130 Q122 143 130 148 Q125 135 133 126 Q136 140 130 152 Q140 142 136 130 Q144 140 138 160 Q132 150 128 165 Z"
          fill="#FF6935"/>
    <path d="M118 165 Q113 153 120 145 Q117 153 124 157 Q120 148 126 141 Q128 150 124 157 Q130 150 128 142 Q133 152 128 165 Z"
          fill="#FFAA55"/>
  </g>

  <!-- Trennlinie Deckel/Schale -->
  <line x1="66" y1="124" x2="190" y2="124" stroke="#555" stroke-width="3"/>

  <!-- Deckel (obere Halbkugel) -->
  <path d="M66 124 Q66 58 128 58 Q190 58 190 124 Z" fill="#3A3A3C"/>
  <!-- Deckel Highlight -->
  <path d="M80 112 Q90 72 128 64 Q105 78 95 108 Z" fill="rgba(255,255,255,0.06)"/>

  <!-- Griff oben -->
  <rect x="110" y="44" width="36" height="16" rx="8" fill="#555"/>

  <!-- Thermometer-Zifferblatt im Deckel -->
  <circle cx="158" cy="100" r="16" fill="#2C2C2E" stroke="#FF6935" stroke-width="2.5"/>
  <!-- Skalierung -->
  <g stroke="#888" stroke-width="1.5" stroke-linecap="round">
    <line x1="158" y1="85.5" x2="158" y2="88.5"/>  <!-- oben -->
    <line x1="170.5" y1="100" x2="167.5" y2="100"/> <!-- rechts -->
    <line x1="158" y1="114.5" x2="158" y2="111.5"/> <!-- unten -->
    <line x1="145.5" y1="100" x2="148.5" y2="100"/> <!-- links -->
  </g>
  <!-- Zeiger (zeigt auf ~2 Uhr = hohe Temperatur) -->
  <line x1="158" y1="100" x2="166" y2="92" stroke="#FF6935" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="158" cy="100" r="2.5" fill="#FF6935"/>

  <!-- Bluetooth-Symbol (klein, oben links) -->
  <g transform="translate(34,34)" opacity="0.75">
    <circle cx="12" cy="12" r="12" fill="#1C1C1E"/>
    <!-- B-Form des Bluetooth-Zeichens -->
    <path d="M10 5 L16 10 L10 15 L16 20 L10 25 M10 5 L10 25"
          fill="none" stroke="#4A90E2" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
          transform="translate(0,-3) scale(0.72)"/>
  </g>
</svg>
